apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubelet-csr-approver
  namespace: kubelet-csr-approver
  labels:
    app.kubernetes.io/name: kubelet-csr-approver
spec:
  # Single replica — approval is idempotent and the controller is stateless.
  # See README "Operational principles" for when to revisit.
  replicas: 1
  strategy:
    # Avoid two replicas briefly racing on the same CSR during a rollout.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kubelet-csr-approver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubelet-csr-approver
    spec:
      serviceAccountName: kubelet-csr-approver
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubelet-csr-approver
          image: ghcr.io/truonghoangphuloc/kubelet-serving-csr-approver:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=false
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: probes
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
